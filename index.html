<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiobooks Collection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Audiobooks Collection</h1>
        <p>Below is a list of available audiobooks:</p>
        <table class="table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Genre</th>
                    <th>Download</th>
                </tr>
            </thead>
            <tbody id="audiobooks-table-body">
                <!-- Data will be populated here -->
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            Papa.parse("audiobooks.csv", {
                download: true,
                header: true,
                complete: function(results) {
                    const tableBody = document.getElementById("audiobooks-table-body");
                    results.data.forEach((row) => {
                        const tr = document.createElement("tr");
                        tr.innerHTML = `
                            <td>${row.title}</td>
                            <td>${row.author}</td>
                            <td>${row.genre}</td>
                            <td><a href="${row.link}" download>Download</a></td>
                        `;
                        tableBody.appendChild(tr);
                    });
                }
            });
        });
    </script>
</body>
</html>
